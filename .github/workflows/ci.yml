name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src/ streamlit_app/ dags/

  dbt-parse:
    name: dbt parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-core dbt-postgres

      - name: Create CI profiles.yml
        run: |
          cat > dbt_job_market_radar/profiles.yml << 'EOF'
          job_market_radar:
            target: dev
            outputs:
              dev:
                type: postgres
                host: localhost
                port: 5432
                user: ci
                password: ci
                dbname: ci
                schema: public
                threads: 1
          EOF

      - name: Parse dbt project
        run: dbt parse --project-dir dbt_job_market_radar --profiles-dir dbt_job_market_radar
