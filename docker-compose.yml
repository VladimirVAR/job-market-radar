x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: job_market_radar_airflow:local
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER}:${AIRFLOW_POSTGRES_PASSWORD}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"

    PYTHONPATH: /opt/airflow/project

    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    FRANCE_TRAVAIL_CLIENT_ID: ${FRANCE_TRAVAIL_CLIENT_ID}
    FRANCE_TRAVAIL_CLIENT_SECRET: ${FRANCE_TRAVAIL_CLIENT_SECRET}
    FRANCE_TRAVAIL_SAMPLE_MODE: ${FRANCE_TRAVAIL_SAMPLE_MODE:-true}
    FRANCE_TRAVAIL_SAMPLE_FILE: ${FRANCE_TRAVAIL_SAMPLE_FILE:-data/sample/france_travail_sample_response.json}
    FRANCE_TRAVAIL_SEARCH_KEYWORDS: ${FRANCE_TRAVAIL_SEARCH_KEYWORDS:-data engineer}
    FRANCE_TRAVAIL_MAX_PAGES: ${FRANCE_TRAVAIL_MAX_PAGES:-1}
    FRANCE_TRAVAIL_PAGE_SIZE: ${FRANCE_TRAVAIL_PAGE_SIZE:-50}
    PIPELINE_TRIGGERED_BY: airflow

    _PIP_ADDITIONAL_REQUIREMENTS: ""
    DBT_THREADS: ${DBT_THREADS:-1}
    DBT_TARGET_PATH: ${DBT_TARGET_PATH:-/tmp/job_market_radar_dbt_target}
    DBT_BIN: ${DBT_BIN:-/home/airflow/dbt_venv/bin/dbt}
  volumes:
    - ./dags:/opt/airflow/dags
    - .:/opt/airflow/project
    - airflow_logs:/opt/airflow/logs
  user: "${AIRFLOW_UID}:0"
  depends_on:
    airflow-postgres:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    container_name: job_market_radar_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/ddl:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-postgres:
    image: postgres:16
    container_name: job_market_radar_airflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_POSTGRES_USER} -d ${AIRFLOW_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: job_market_radar_airflow_init
    restart: "no"
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USER}
      --password ${AIRFLOW_ADMIN_PASSWORD}
      --firstname ${AIRFLOW_ADMIN_FIRSTNAME}
      --lastname ${AIRFLOW_ADMIN_LASTNAME}
      --role Admin
      --email ${AIRFLOW_ADMIN_EMAIL}
      || true"

  airflow-webserver:
    <<: *airflow-common
    container_name: job_market_radar_airflow_webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "${AIRFLOW_WEBSERVER_PORT}:8080"
    command: webserver

  airflow-scheduler:
    <<: *airflow-common
    container_name: job_market_radar_airflow_scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler

  streamlit:
    image: python:3.12-slim
    container_name: job_market_radar_streamlit
    restart: unless-stopped
    profiles:
      - dashboard
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - .:/app
    ports:
      - "${STREAMLIT_PORT}:8501"
    command: >
      bash -c "
      pip install -r requirements.txt &&
      streamlit run streamlit_app/app.py --server.address=0.0.0.0
      "

volumes:
  postgres_data:
  airflow_postgres_data:
  airflow_logs: